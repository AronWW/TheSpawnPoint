spring.application.name=backend

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL}
app.email.verification-expiration=${EMAIL_VERIFICATION_EXPIRATION}

# File upload
app.upload.dir=uploads/avatars
app.upload.max-size=2097152
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.avatar-folder=${CLOUDINARY_AVATAR_FOLDER:thespawnpoint/avatars/dev}

# LiveKit
app.livekit.url=${LIVEKIT_URL}
app.livekit.api-key=${LIVEKIT_API_KEY}
app.livekit.api-secret=${LIVEKIT_API_SECRET}
app.livekit.token-ttl-minutes=${LIVEKIT_TOKEN_TTL_MINUTES:30}

