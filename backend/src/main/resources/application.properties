spring.application.name=backend
server.port=${PORT:8080}

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${DB_USERNAME}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${DB_PASSWORD}}}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Email
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL}
app.email.verification-expiration=${EMAIL_VERIFICATION_EXPIRATION}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Thymeleaf (used for email templates only)
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# File upload
app.upload.dir=uploads/avatars
app.upload.group-avatar.dir=uploads/group-avatars
app.upload.max-size=2097152
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:120MB}

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.avatar-folder=${CLOUDINARY_AVATAR_FOLDER:thespawnpoint/avatars}

# LiveKit
app.livekit.url=${LIVEKIT_URL}
app.livekit.api-key=${LIVEKIT_API_KEY}
app.livekit.api-secret=${LIVEKIT_API_SECRET}
app.livekit.token-ttl-minutes=${LIVEKIT_TOKEN_TTL_MINUTES:30}


app.cookies.secure=${APP_COOKIES_SECURE:false}
app.cookies.same-site=${APP_COOKIES_SAME_SITE:Lax}

# Login: 5 requests per 1 minute
app.rate-limit.login.capacity=5
app.rate-limit.login.seconds=60

# Register: 3 requests per 1 hour
app.rate-limit.register.capacity=3
app.rate-limit.register.seconds=3600

# Forgot Password: 3 requests per 1 hour
app.rate-limit.forgot-password.capacity=3
app.rate-limit.forgot-password.seconds=3600

# Default/Global: 20 requests per 1 minute
app.rate-limit.default.capacity=20
app.rate-limit.default.seconds=60

# Chat: 10 messages per 5 seconds
app.rate-limit.chat.capacity=10
app.rate-limit.chat.seconds=5

# Spam detection
app.rate-limit.chat.spam-threshold=3

# Uploads: 5 uploads per 1 hour
app.rate-limit.upload.capacity=5
app.rate-limit.upload.seconds=3600
