<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Підтвердження пошти</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0b;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0b;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="520" cellpadding="0" cellspacing="0" style="background:#141416;border:1px solid #2a2a2e;border-top:3px solid #f5c518;">

                <tr>
                    <td style="padding:32px 40px 16px;text-align:center;">
                        <h1 style="margin:0;font-size:22px;letter-spacing:4px;color:#ffffff;font-weight:800;">
                            THE<span style="color:#f5c518;">SPAWN</span>POINT
                        </h1>
                    </td>
                </tr>

                <tr>
                    <td style="padding:0 40px;">
                        <div style="height:1px;background:linear-gradient(90deg,transparent,#f5c518,transparent);opacity:0.4;"></div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:32px 40px 8px;text-align:center;">
                        <h2 style="margin:0 0 8px;font-size:18px;color:#ffffff;font-weight:700;letter-spacing:1px;">
                            ПІДТВЕРДЖЕННЯ ПОШТИ
                        </h2>
                        <p style="margin:0 0 24px;font-size:14px;color:#8e8e93;line-height:1.6;">
                            Привіт, <strong style="color:#ffffff;" th:text="${displayName}">Гравець</strong>!<br/>
                            Для завершення реєстрації введи код підтвердження:
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding:0 40px 24px;text-align:center;">
                        <div style="display:inline-block;background:#1e1e22;border:2px solid #f5c518;padding:18px 48px;letter-spacing:12px;font-size:32px;font-weight:800;color:#f5c518;font-family:'Courier New',monospace;" th:text="${code}">
                            123456
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:0 40px 32px;text-align:center;">
                        <div style="display:inline-block;background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.15);padding:8px 20px;font-size:12px;color:#f5c518;letter-spacing:1px;">
                            ⏱ КОД ДІЄ 10 ХВИЛИН
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:0 40px;">
                        <div style="height:1px;background:#2a2a2e;"></div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:24px 40px;text-align:center;">
                        <p style="margin:0;font-size:12px;color:#5a5a5e;line-height:1.6;">
                            🔒 Якщо ви не реєструвались на TheSpawnPoint — просто проігноруйте цей лист.<br/>
                            Ніколи не повідомляйте код нікому.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding:20px 40px;background:#0e0e10;text-align:center;border-top:1px solid #2a2a2e;">
                        <p style="margin:0;font-size:11px;color:#3a3a3e;letter-spacing:1px;">
                            © 2026 THESPAWNPOINT · GAME ON
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
